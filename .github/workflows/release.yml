name: Release Build

on:
  release:
    types: [created, published]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission to gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Build Release Bundle
      run: ./gradlew bundleRelease

    - name: Upload Release APK to Release
      uses: actions/upload-release-asset@v1
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./app/build/outputs/apk/release/app-release.apk
        asset_name: app-release-${{ github.event.release.tag_name }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Upload Release Bundle
      uses: actions/upload-release-asset@v1
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./app/build/outputs/bundle/release/app-release.aab
        asset_name: app-release-${{ github.event.release.tag_name }}.aab
        asset_content_type: application/octet-stream

    - name: Create Build Report
      if: always()
      run: |
        echo "# Release Build Report" > build_report.md
        echo "**Version:** ${{ github.event.release.tag_name }}" >> build_report.md
        echo "**Status:** ${{ job.status }}" >> build_report.md
        echo "**Timestamp:** $(date)" >> build_report.md

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: release-artifacts
        path: |
          app/build/outputs/apk/release/
          app/build/outputs/bundle/release/
